    # Volume Claim settings.
    # ref: https://www.elastic.co/guide/en/cloud-on-k8s/current/k8s-volume-claim-templates.html
    #
    volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
        # Adjust to your storage class name
        #
        # storageClassName: local-storage

eck-kibana:
  version: 9.4.1
  enabled: true

  # Name of the Kibana instance.
  #
  fullnameOverride: kibana
  
  # Reference to ECK-managed Elasticsearch instance, ideally from {{ "elasticsearch.fullname" }}
  #
  elasticsearchRef:
    name: elasticsearch

  config:
    # Note that these are specific to the namespace into which this example is installed, and are
    # using `elastic-stack` as configured here and detailed in the README when installing:
    #
    # `helm install es-kb-quickstart elastic/eck-stack -n elastic-stack`
    #
    # If installed outside of the `elastic-stack` namespace, the following 2 lines need modification.
    xpack.fleet.agents.elasticsearch.hosts: ["https://elasticsearch-es-http.elasticsearch.svc:9200"]
    xpack.fleet.agents.fleet_server.hosts: ["https://fleet-server-agent-http.elasticsearch.svc:8220"]
    xpack.encryptedSavedObjects.encryptionKey: "something_at_least_32_characters"
    xpack.fleet.packages:
    - name: system
      version: latest
    - name: elastic_agent
      version: latest
    - name: fleet_server
      version: latest
    - name: kubernetes
      version: latest
    - name: apm
      version: latest      
    xpack.fleet.agentPolicies:
    - name: Fleet Server on ECK policy
      id: eck-fleet-server
      namespace: default
      is_managed: true
      monitoring_enabled:
      - logs
      - metrics
      package_policies:
      - name: fleet_server-1
        id: fleet_server-1
        package:
          name: fleet_server
    - name: Elastic Agent on ECK policy
      id: eck-agent
      namespace: default
      is_managed: true
      monitoring_enabled:
      - logs
      - metrics
      unenroll_timeout: 900
      package_policies:
      - package:
          name: system
        name: system-1
      - package:
          name: kubernetes
        name: kubernetes-1

eck-agent:
  version: 9.4.1
  enabled: true
  
  # Agent policy to be used.
  policyID: eck-agent
  # Reference to ECK-managed Kibana instance.
  #
  kibanaRef:
    name: kibana
  elasticsearchRefs: []
  # Reference to ECK-managed Fleet instance.
  #
  fleetServerRef:
    name: fleet-server
  
  mode: fleet
  daemonSet:
    podTemplate:
      spec:
        serviceAccountName: elastic-agent
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        automountServiceAccountToken: true
        securityContext:
          runAsUser: 0
  
eck-fleet-server:
  version: 9.4.1
  enabled: true

  fullnameOverride: "fleet-server"

  deployment:
    replicas: 3
    podTemplate:
      spec:
        serviceAccountName: fleet-server
        automountServiceAccountToken: true

  # Agent policy to be used.
  policyID: eck-fleet-server
  kibanaRef:
    name: kibana
  elasticsearchRefs:
  - name: elasticsearch

eck-apm-server:
  version: 9.4.1
  enabled: true

  # Count of APM Server replicas to create.
  #
  count: 3

  config:
    name: elastic-apm
    apm-server.jaeger.grpc.enabled: true
    apm-server.jaeger.grpc.host: "0.0.0.0:14250"
    output:
      elasticsearch:
        hosts: ["https://elasticsearch-es-http.elasticsearch.svc:9200"]
        username: elastic
        password: "${elastic}"
        protocol: "https"
        ssl.certificate_authorities:
          ["/usr/share/apm-server/config/elasticsearch-ca/tls.crt"]

  # Reference to ECK-managed Elasticsearch resource.
  #
  elasticsearchRef:
    name: elasticsearch
  kibanaRef:
    name: kibana
  http:
    service:
      spec:
        ports:
        - name: http
          port: 8200
          targetPort: 8200
        - name: grpc
          port: 14250
          targetPort: 14250