apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
# https://www.rabbitmq.com/kubernetes/operator/using-operator
# https://github.com/rabbitmq/cluster-operator/blob/main/docs/examples/production-ready/rabbitmq.yaml
metadata:
  name: rabbitmq
spec:
  replicas: 3
  terminationGracePeriodSeconds: 60
  resources:
    requests:
      cpu: 1
      memory: 5Gi
    limits:
      cpu: 1
      memory: 5Gi
  rabbitmq:
    additionalPlugins:
    # RabbitMQ Cluster Kubernetes Operator enabled rabbitmq_peer_discovery_k8s, rabbitmq_prometheus and rabbitmq_management by default.
      - rabbitmq_top
      - rabbitmq_shovel    
      - rabbitmq_federation
      - rabbitmq_federation_management
      - rabbitmq_management_agent
    additionalConfig: |
      ssl_options.fail_if_no_peer_cert = true
      cluster_partition_handling = pause_minority
      vm_memory_high_watermark_paging_ratio = 0.99
      disk_free_limit.relative = 1.0
      collect_statistics_interval = 10000
    envConfig: |
      RABBITMQ_USE_LONGNAME=true
    #erlangInetConfig: |
    #  {inet6, true}.
    #envConfig: |
    #    SERVER_ADDITIONAL_ERL_ARGS="-kernel inetrc '/etc/rabbitmq/erl_inetrc'  -proto_dist inet6_tcp"
    #    RABBITMQ_CTL_ERL_ARGS="-proto_dist inet6_tcp"
  tls:
    # The Secret must already exist in the same Namespace as the RabbitmqCluster object. 
    # It is expected that the Secret contains tls.key and tls.crt for the private key and public certificate respectively.
    # Note that caSecretName can be the same Secret as spec.tls.secretName. This Secret must have a key ca.crt containing the CA certificate.
    secretName: rabbitmq-tls-secret
    caSecretName: rabbitmq-tls-secret
    disableNonTLSListeners: false
  persistence:
    #storageClassName: gp3
    storage: 10Gi
  #affinity:
  #  podAntiAffinity:
  #    requiredDuringSchedulingIgnoredDuringExecution:
  #    - labelSelector:
  #        matchExpressions:
  #          - key: app.kubernetes.io/name
  #            operator: In
  #            values:
  #            - rabbitmq
  #      topologyKey: kubernetes.io/hostname
  override:
    statefulSet:
      spec:
        template:
          spec:
            containers: []
            #topologySpreadConstraints:
            #- maxSkew: 1
            #  topologyKey: "topology.kubernetes.io/zone"
            #  whenUnsatisfiable: DoNotSchedule
            #  labelSelector:
            #    matchLabels:
            #      app.kubernetes.io/name: rabbitmq
