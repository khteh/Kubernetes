apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-aspnetcorewebapi
  namespace: default
spec:
  minReplicas: 2
  maxReplicas: 5
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: aspnetcorewebapi
  metrics:
  - type: ContainerResource
    containerResource:
      name: cpu
      container: aspnetcorewebapi
      target: 
        type: Utilization
        averageUtilization: 75
  - type: Object
    object: 
      metric: 
        name: requests-per-second
      describedObject:
        apiVersion: networking.k8s.io/v1
        kind: Ingress 
        name: ingress
      target: 
        type: Value
        value: 10k
#  - type: ContainerResource
#    containerResource:
#      name: memory
#      container: aspnetcorewebapi
