apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.serviceName }}
  labels:
    component: {{ .Values.componentName }}
    app: {{ .Values.applicationName }}
spec:
  ports:
  - name: https
    port: {{ .Values.ports.https }}
    targetPort: https
  - name: http
    port: {{ .Values.ports.http }}
    targetPort: http
  - name: bolt
    port: {{ .Values.ports.bolt }}
    targetPort: bolt
  clusterIP: None
  selector:
    app: {{ .Values.applicationName }}
    component: {{ .Values.componentName }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.serviceNameNodePort }}
  labels:
    component: {{ .Values.componentName }}
    app: {{ .Values.applicationName }}
spec:
  type: NodePort
  ports:
  - name: https
    port: {{ .Values.ports.https }}
    nodePort: {{ .Values.ports.httpsNodePort }}
  - name: http
    port: {{ .Values.ports.http }}
    nodePort: {{ .Values.ports.httpNodePort }}
  - name: bolt
    port: {{ .Values.ports.bolt }}
    nodePort: {{ .Values.ports.boltNodePort }}
  selector:
    app: {{ .Values.applicationName }}
    component: {{ .Values.componentName }}
