apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.applicationName }}
  labels:
    component: {{ .Values.componentName }}
    app: {{ .Values.applicationName }}
spec:
  serviceName: {{ .Values.serviceName }}
  podManagementPolicy: {{ .Values.podManagementPolicy }}
  replicas: {{ .Values.replicaCount }}
  updateStrategy: 
    type: {{ .Values.updateStrategy }}
  selector:
    matchLabels:
      app: {{ .Values.applicationName }}
      component: {{ .Values.componentName }}
  template:
    metadata:
      labels:
        app: {{ .Values.applicationName }}
        component: {{ .Values.componentName }}
      annotations:
        # Re-evaluates on every upgrade; triggers restart if config changes
        checksum/config: {{ include (print $.Template.BasePath "/ragagent_config.yml") . | sha512sum }}        
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ .Values.applicationName }}
        image: "{{ .Values.image.application.repository }}:{{ .Values.image.application.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        {{- if .Values.postgresql }}
          - name: DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: {{ .Values.postgresql.secretName }}
                key: {{ .Values.postgresql.user }}
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.postgresql.secretName }}
                key: {{ .Values.postgresql.passwordKey }}
        {{- end }}
        {{- if .Values.gemini }}
          - name: GEMINI_API_KEY
            valueFrom:
              secretKeyRef:
                name: {{ .Values.gemini.secretName }}
                key: {{ .Values.gemini.apikey }}
        {{- end }}
          - name: NEO4J_AUTH
            valueFrom:
              secretKeyRef:
                name: {{ required "Neo4J authentication secretName!" .Values.neo4j.secretName}}
                key: {{ required "Neo4J authentication secretKey!" .Values.neo4j.secretKey}}
        ports:
        - containerPort: {{ .Values.service.port }}
          name: {{ .Values.service.portName }}
          protocol: {{ .Values.service.protocol }}
        {{- with .Values.startupProbe }}
        startupProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.readinessProbe }}
        readinessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.livenessProbe }}
        livenessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.volumeMounts.application }}
        volumeMounts:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.resources.application }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      - name: {{ .Values.sidecarName }}
        image: "{{ .Values.image.sidecar.repository }}:{{ .Values.image.sidecar.tag }}"
        {{- with .Values.volumeMounts.sidecar }}
        volumeMounts:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.resources.sidecar }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
